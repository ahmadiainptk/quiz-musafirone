<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Presentasi Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {}
            }
        }
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <style>
        /* Mencegah scrolling/pull-to-refresh saat mencoret-coret di perangkat sentuh */
        canvas {
            touch-action: none;
        }
        /* Transisi halus untuk overlay peek */
        .peek-enter-active, .peek-leave-active {
            transition: opacity 0.2s ease;
        }
        .peek-enter-from, .peek-leave-to {
            opacity: 0;
        }
    </style>
</head>
<body x-data="quizApp()" :class="{ 'dark': darkMode }" class="h-screen w-screen overflow-hidden flex flex-col transition-colors duration-300 font-sans">
    
    <header class="flex-shrink-0 bg-white/95 dark:bg-gray-800/95 backdrop-blur shadow z-50 p-4 flex flex-wrap justify-between items-center gap-4 text-gray-800 dark:text-gray-100 relative">
        
        <div class="flex-1 flex items-center gap-4 min-w-[200px]">
            <h1 x-show="!whiteboardOpen && !isFinished" class="text-xl md:text-2xl font-bold">
                Soal <span x-text="currentIndex + 1"></span> / <span x-text="questions.length"></span>
            </h1>
            <h1 x-show="whiteboardOpen" class="text-xl md:text-2xl font-bold text-indigo-500">
                Whiteboard
            </h1>
            
            <button x-show="whiteboardOpen" 
                    @mousedown="isPeeking = true" 
                    @mouseup="isPeeking = false" 
                    @mouseleave="isPeeking = false"
                    @touchstart="isPeeking = true" 
                    @touchend="isPeeking = false"
                    class="px-4 py-2 bg-yellow-400 hover:bg-yellow-500 text-yellow-900 rounded-lg shadow font-bold text-sm transition active:scale-95 select-none cursor-pointer flex items-center gap-2">
                <span>👀</span> <span class="hidden md:inline">Tahan untuk Intip Soal</span>
            </button>
        </div>

        <div class="flex-1 flex justify-center items-center gap-3 md:gap-6 font-mono text-sm md:text-base font-bold bg-gray-100 dark:bg-gray-700 px-4 py-2 rounded-lg shadow-inner">
            <div class="text-blue-600 dark:text-blue-400 flex items-center gap-2">
                <span>Total:</span> <span x-text="formatTime(totalTime)"></span>
            </div>
            <div class="w-px h-5 bg-gray-300 dark:bg-gray-600"></div>
            <div class="text-orange-600 dark:text-orange-400 flex items-center gap-2">
                <span>Soal:</span> <span x-text="formatTime(questionTime)"></span>
            </div>
        </div>

        <div class="flex-1 flex justify-end items-center gap-3">
            <button @click="toggleWhiteboard()" :disabled="isFinished" class="px-4 py-2 bg-indigo-500 hover:bg-indigo-600 disabled:opacity-50 disabled:cursor-not-allowed text-white rounded-lg shadow transition font-bold text-sm md:text-base flex items-center gap-2">
                <svg x-show="!whiteboardOpen" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                <svg x-show="whiteboardOpen" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                <span x-text="whiteboardOpen ? 'Tutup Whiteboard' : 'Whiteboard'" class="hidden md:inline"></span>
            </button>

            <button @click="darkMode = !darkMode" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 transition">
                <svg x-show="!darkMode" class="w-6 h-6 text-yellow-500" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"/></svg>
                <svg x-show="darkMode" class="w-6 h-6 text-gray-300" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/></svg>
            </button>
        </div>
    </header>

    <main class="flex-grow relative w-full bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-100 flex flex-col">
        
        <div x-show="!whiteboardOpen && !isFinished" class="absolute inset-0 flex flex-col justify-center overflow-y-auto px-6 md:px-16 py-8">
            <div class="max-w-6xl w-full mx-auto" x-show="questions.length > 0">
                
                <div class="text-3xl md:text-5xl font-medium leading-tight mb-12 text-center md:text-left">
                    <p x-text="questions[currentIndex].text"></p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-12">
                    <template x-for="(option, index) in questions[currentIndex].options" :key="index">
                        <div 
                            @click="!isChecked ? selectedOption = index : null"
                            class="p-6 md:p-8 border-4 rounded-2xl cursor-pointer transition-all duration-200 shadow-sm"
                            :class="{
                                'border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 hover:border-blue-400 dark:hover:border-blue-500': selectedOption !== index && !isChecked,
                                'border-blue-500 bg-blue-50 dark:bg-blue-900/40': selectedOption === index && !isChecked,
                                'border-green-500 bg-green-100 dark:bg-green-900/60 text-green-900 dark:text-green-100': isChecked && index === questions[currentIndex].answer,
                                'border-red-500 bg-red-100 dark:bg-red-900/60 text-red-900 dark:text-red-100': isChecked && selectedOption === index && index !== questions[currentIndex].answer,
                                'opacity-40 cursor-not-allowed': isChecked && index !== questions[currentIndex].answer && selectedOption !== index
                            }">
                            
                            <div class="flex items-center gap-6">
                                <div class="w-12 h-12 flex-shrink-0 rounded-full flex items-center justify-center font-bold text-xl bg-gray-100 dark:bg-gray-700 border-2 border-inherit"
                                     x-text="String.fromCharCode(65 + index)"></div>
                                <span class="text-2xl font-medium" x-text="option"></span>
                            </div>
                        </div>
                    </template>
                </div>

                <div class="flex justify-center md:justify-end gap-4">
                    <button 
                        @click="checkAnswer()" 
                        :disabled="selectedOption === null || isChecked"
                        class="px-8 py-4 bg-green-500 hover:bg-green-600 disabled:bg-gray-400 dark:disabled:bg-gray-600 disabled:cursor-not-allowed text-white text-xl font-bold rounded-xl shadow-lg transition transform active:scale-95">
                        Periksa Jawaban
                    </button>

                    <button 
                        x-show="isChecked"
                        @click="nextQuestion()" 
                        class="px-8 py-4 bg-blue-600 hover:bg-blue-700 text-white text-xl font-bold rounded-xl shadow-lg transition transform active:scale-95">
                        <span x-text="currentIndex === questions.length - 1 ? 'Selesai' : 'Soal Selanjutnya ➔'"></span>
                    </button>
                </div>
            </div>
        </div>

        <div x-show="whiteboardOpen" style="display: none;" class="absolute inset-0 z-40 bg-white dark:bg-gray-900 overflow-hidden">
            
            <div class="absolute bottom-6 left-6 bg-white/90 dark:bg-gray-800/90 backdrop-blur border dark:border-gray-700 p-3 rounded-2xl shadow-2xl flex gap-4 items-center z-50">
                <div class="font-bold text-sm text-gray-500 dark:text-gray-400 px-2">Alat:</div>
                <input type="color" x-model="penColor" class="w-10 h-10 rounded cursor-pointer border-0 p-0">
                <button @click="clearCanvas()" class="px-5 py-2 bg-red-500 hover:bg-red-600 text-white font-bold rounded-xl shadow">Bersihkan</button>
            </div>

            <div x-show="isPeeking" 
                 x-transition:enter="peek-enter-active"
                 x-transition:enter-start="peek-enter-from"
                 x-transition:leave="peek-leave-active"
                 x-transition:leave-end="peek-leave-to"
                 class="absolute inset-0 z-50 bg-black/80 backdrop-blur-sm flex items-center justify-center p-8 pointer-events-none">
                
                <div class="bg-white dark:bg-gray-800 p-10 rounded-2xl shadow-2xl max-w-5xl w-full border-4 border-yellow-400">
                    <div class="text-yellow-500 font-bold mb-4 uppercase tracking-widest text-sm flex items-center gap-2">
                        <span>👀</span> Sedang Mengintip Soal
                    </div>
                    <p class="text-3xl md:text-4xl font-medium mb-8" x-text="questions[currentIndex].text"></p>
                    <div class="grid grid-cols-2 gap-4">
                        <template x-for="(option, idx) in questions[currentIndex].options">
                            <div class="p-4 bg-gray-100 dark:bg-gray-700 rounded-lg text-xl flex items-center gap-4">
                                <div class="font-bold w-8 h-8 flex items-center justify-center bg-gray-200 dark:bg-gray-600 rounded-full text-sm" x-text="String.fromCharCode(65+idx)"></div>
                                <span x-text="option"></span>
                            </div>
                        </template>
                    </div>
                </div>
            </div>

            <canvas 
                x-ref="canvas"
                class="absolute inset-0 w-full h-full cursor-crosshair"
                @mousedown="startDrawing"
                @mousemove="draw"
                @mouseup="stopDrawing"
                @mouseout="stopDrawing"
                @touchstart="startDrawing"
                @touchmove="draw"
                @touchend="stopDrawing">
            </canvas>
        </div>

        <div x-show="isFinished" class="absolute inset-0 flex items-center justify-center bg-gray-50 dark:bg-gray-900 z-50">
            <div class="text-center bg-white dark:bg-gray-800 p-12 rounded-3xl shadow-2xl border dark:border-gray-700">
                <div class="text-6xl mb-6">🎉</div>
                <h2 class="text-4xl font-bold text-green-500 mb-6">Quiz Selesai!</h2>
                <div class="text-2xl mb-8 flex flex-col gap-2">
                    <p>Total Waktu Anda:</p>
                    <p class="text-5xl font-mono font-bold text-blue-600 dark:text-blue-400" x-text="formatTime(totalTime)"></p>
                </div>
                <button @click="location.reload()" class="px-8 py-4 bg-indigo-500 hover:bg-indigo-600 text-white rounded-xl font-bold text-xl shadow-lg transform active:scale-95 transition">Ulangi Quiz</button>
            </div>
        </div>

    </main>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('quizApp', () => ({
                darkMode: false,
                
                // Data JSON Soal
                questions: [
                    {
                        "id": 1,
                        "text": "Berapakah hasil dari 15 x 12?",
                        "options": ["170", "180", "190", "200"],
                        "answer": 1
                    },
                    {
                        "id": 2,
                        "text": "Teknologi manakah yang merupakan runtime JavaScript untuk lingkungan server-side?",
                        "options": ["AlpineJS", "TailwindCSS", "Node.js", "Astro"],
                        "answer": 2
                    },
                    {
                        "id": 3,
                        "text": "Jika sebuah segitiga siku-siku memiliki panjang alas 3 cm dan tinggi 4 cm, berapakah panjang sisi miringnya?",
                        "options": ["5 cm", "6 cm", "7 cm", "8 cm"],
                        "answer": 0
                    }
                ],
                
                currentIndex: 0,
                selectedOption: null,
                isChecked: false,
                isFinished: false,
                
                // Timers
                totalTime: 0,
                questionTime: 0,
                timerInterval: null,
                
                // Whiteboard & Peek
                whiteboardOpen: false,
                isPeeking: false,
                isDrawing: false,
                ctx: null,
                penColor: '#3b82f6', // Default blue

                init() {
                    // Mulai timer utama
                    this.timerInterval = setInterval(() => {
                        if (!this.isFinished) {
                            this.totalTime++;
                            this.questionTime++;
                        }
                    }, 1000);

                    // Re-render canvas saat ukuran layar berubah (jika whiteboard aktif)
                    window.addEventListener('resize', () => {
                        if (this.whiteboardOpen) {
                            this.resizeCanvas();
                        }
                    });
                },

                formatTime(seconds) {
                    const m = Math.floor(seconds / 60).toString().padStart(2, '0');
                    const s = (seconds % 60).toString().padStart(2, '0');
                    return `${m}:${s}`;
                },

                checkAnswer() {
                    if (this.selectedOption !== null) {
                        this.isChecked = true;
                    }
                },

                nextQuestion() {
                    if (this.currentIndex < this.questions.length - 1) {
                        this.currentIndex++;
                        this.selectedOption = null;
                        this.isChecked = false;
                        this.questionTime = 0; // Reset timer untuk soal baru
                        this.whiteboardOpen = false; // Otomatis tutup whiteboard di soal baru
                    } else {
                        this.isFinished = true;
                        this.whiteboardOpen = false;
                    }
                },

                // ---- Logika Whiteboard ----
                toggleWhiteboard() {
                    this.whiteboardOpen = !this.whiteboardOpen;
                    if (this.whiteboardOpen) {
                        // $nextTick memastikan elemen canvas sudah dirender di DOM sebelum di-resize
                        this.$nextTick(() => {
                            this.resizeCanvas();
                        });
                    }
                },

                resizeCanvas() {
                    const canvas = this.$refs.canvas;
                    const container = canvas.parentElement;
                    
                    // Simpan coretan yang sudah ada
                    const imgData = this.ctx && canvas.width > 0 ? this.ctx.getImageData(0, 0, canvas.width, canvas.height) : null;
                    
                    canvas.width = container.clientWidth;
                    canvas.height = container.clientHeight;
                    
                    this.ctx = canvas.getContext('2d');
                    this.ctx.lineCap = 'round';
                    this.ctx.lineJoin = 'round';
                    
                    if (imgData) {
                        this.ctx.putImageData(imgData, 0, 0);
                    }
                },

                getCoordinates(e) {
                    const canvas = this.$refs.canvas;
                    const rect = canvas.getBoundingClientRect();
                    
                    if (e.type.includes('touch')) {
                        e.preventDefault(); 
                        return {
                            x: e.touches[0].clientX - rect.left,
                            y: e.touches[0].clientY - rect.top
                        };
                    }
                    return {
                        x: e.clientX - rect.left,
                        y: e.clientY - rect.top
                    };
                },

                startDrawing(e) {
                    this.isDrawing = true;
                    this.ctx.lineWidth = 4;
                    this.ctx.strokeStyle = this.penColor;
                    const pos = this.getCoordinates(e);
                    
                    this.ctx.beginPath();
                    this.ctx.moveTo(pos.x, pos.y);
                    this.draw(e);
                },

                draw(e) {
                    if (!this.isDrawing) return;
                    const pos = this.getCoordinates(e);
                    
                    this.ctx.lineTo(pos.x, pos.y);
                    this.ctx.stroke();
                    this.ctx.beginPath();
                    this.ctx.moveTo(pos.x, pos.y);
                },

                stopDrawing() {
                    this.isDrawing = false;
                    if(this.ctx) this.ctx.beginPath();
                },

                clearCanvas() {
                    if(this.ctx) {
                        this.ctx.clearRect(0, 0, this.$refs.canvas.width, this.$refs.canvas.height);
                    }
                }
            }));
        });
    </script>
</body>
</html>
